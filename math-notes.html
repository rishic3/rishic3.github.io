<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <!-- Highlight.js -->
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <!-- Marked -->
    <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>

</head>
<body>
    <div class="page-wrapper">
        <nav class="nav">
            <div class="nav-inner">
                <a href="index.html" class="nav-title">Rishi Chandra</a>
                <div class="nav-links">
                    <a href="reading-notes.html" class="nav-link">Reading</a>
                    <a href="math-notes.html" class="nav-link active">Writing</a>
                    <button class="dark-mode-toggle" aria-label="Toggle dark mode"></button>
                </div>
            </div>
        </nav>

        <main class="page-content">
            <!-- List view -->
            <div id="list-view">
                <div class="page-header">
                    <h1>Writing</h1>
                    <p class="subtitle">Written miscellany, mainly notes.</p>
                </div>
                <ul class="post-list" id="post-list">
                    <li class="loading">Loading posts...</li>
                </ul>
            </div>

            <!-- Post view (hidden initially) -->
            <div id="post-view" style="display:none;">
                <div class="post-wrapper" id="post-wrapper"></div>
            </div>
        </main>

        <footer class="social-links">
            <a href="https://github.com/rishic3" target="_blank" class="social-link" aria-label="GitHub">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
            </a>
            <a href="https://linkedin.com/in/chandrarishi" target="_blank" class="social-link" aria-label="LinkedIn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
            </a>
            <a href="mailto:rishichandra159@gmail.com" class="social-link" aria-label="Email">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </a>
        </footer>
    </div>

    <script src="js/markdown-blog.js"></script>
    <script src="js/back-to-top.js"></script>
    <script>
        const NOTE_PATHS = [
            'notes/technical/memory-virtualization/memory-virtualization.md',
            'notes/technical/torch-compile/torch-compile.md',
            'notes/technical/gbdt/gbdt.md',
            'notes/technical/svd/svd.md',
            'notes/technical/umap/umap.md'
        ];

        let postsCache = null;

        function slugFromPath(path) {
            const name = path.split('/').pop().replace('.md', '');
            return name;
        }

        function pathFromSlug(slug) {
            return NOTE_PATHS.find(p => slugFromPath(p) === slug) || null;
        }

        function showList() {
            if (window._tocCleanup) { window._tocCleanup(); window._tocCleanup = null; }
            document.getElementById('list-view').style.display = '';
            document.getElementById('post-view').style.display = 'none';
            document.title = 'Writing - Rishi Chandra';
            window.scrollTo({ top: 0 });
        }

        async function showPost(slug) {
            const path = pathFromSlug(slug);
            if (!path) { showList(); return; }

            document.getElementById('list-view').style.display = 'none';
            document.getElementById('post-view').style.display = '';

            const wrapper = document.getElementById('post-wrapper');
            wrapper.innerHTML = '<div class="loading">Loading...</div>';

            try {
                const post = await Blog.fetchPost(path);
                const date = Blog.formatDate(post.meta.date);
                const tagsHTML = (post.meta.tags || [])
                    .map(t => `<span class="tag" data-color="${Blog.tagColor(t)}">${t}</span>`).join('');

                const html = Blog.renderMarkdown(post.content);

                wrapper.innerHTML = `
                    <a class="post-back" href="math-notes.html">← Back to Writing</a>
                    <header class="post-header">
                        <h1 class="post-title">${post.meta.title || 'Untitled'}</h1>
                        <div class="post-meta">
                            ${date ? `<span class="post-date">${date}</span>` : ''}
                        </div>
                        ${post.meta.description ? `<p class="post-description">${post.meta.description}</p>` : ''}
                        ${tagsHTML ? `<div class="post-tags">${tagsHTML}</div>` : ''}
                    </header>
                    <div class="post-content">${html}</div>
                `;

                Blog.enhanceCodeBlocks(wrapper);

                if (window._tocCleanup) { window._tocCleanup(); window._tocCleanup = null; }
                const tocHTML = Blog.generateTOC(wrapper.querySelector('.post-content'));
                if (tocHTML) {
                    wrapper.insertAdjacentHTML('beforeend', tocHTML);
                    window._tocCleanup = Blog.initTOC(wrapper);
                }

                document.title = `${post.meta.title || 'Post'} - Rishi Chandra`;
                const savedY = sessionStorage.getItem('scroll:' + slug);
                if (savedY && !window._navClick) {
                    requestAnimationFrame(() => window.scrollTo(0, parseInt(savedY)));
                } else {
                    window.scrollTo({ top: 0 });
                }
                window._navClick = false;
            } catch (err) {
                wrapper.innerHTML = `<div class="error">Error loading post: ${err.message}</div>`;
            }
        }

        function renderPostList(posts) {
            const list = document.getElementById('post-list');
            if (!posts.length) {
                list.innerHTML = '<li class="loading">No posts found.</li>';
                return;
            }
            list.innerHTML = posts.map(post => {
                const slug = slugFromPath(post.path);
                const date = Blog.formatDate(post.meta.date);
                const tagsHTML = (post.meta.tags || []).slice(0, 3)
                    .map(t => `<span class="tag" data-color="${Blog.tagColor(t)}">${t}</span>`).join('');
                return `
                    <li class="post-list-item">
                        <a class="post-list-link" href="#/post/${slug}">
                            <div class="post-list-title">${post.meta.title || 'Untitled'}</div>
                            ${post.meta.description ? `<div class="post-list-description">${post.meta.description}</div>` : ''}
                            <div class="post-list-meta">
                                ${date ? `<span class="post-list-date">${date}</span>` : ''}
                                ${tagsHTML ? `<span class="post-list-tags">${tagsHTML}</span>` : ''}
                            </div>
                        </a>
                    </li>
                `;
            }).join('');
        }

        function route() {
            const hash = window.location.hash;
            const postMatch = hash.match(/^#\/post\/(.+)$/);
            if (postMatch) {
                showPost(decodeURIComponent(postMatch[1]));
            } else {
                showList();
            }
        }

        window.addEventListener('hashchange', () => {
            window._navClick = true;
            route();
        });

        let _scrollTick = false;
        window.addEventListener('scroll', () => {
            if (_scrollTick) return;
            _scrollTick = true;
            requestAnimationFrame(() => {
                _scrollTick = false;
                const m = window.location.hash.match(/^#\/post\/(.+)$/);
                if (m) sessionStorage.setItem('scroll:' + decodeURIComponent(m[1]), window.scrollY);
            });
        });

        document.addEventListener('DOMContentLoaded', async () => {
            postsCache = await Blog.fetchAllPosts(NOTE_PATHS);
            renderPostList(postsCache);
            route();
        });
    </script>
</body>
</html>
