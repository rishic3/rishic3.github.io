    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.book-toggle.has-notes').forEach(toggle => {
                const filePath = toggle.getAttribute('data-file');
                const contentDiv = toggle.nextElementSibling;
                const markdownDiv = contentDiv.querySelector('.post-content');

                toggle.addEventListener('click', async () => {
                    toggle.classList.toggle('active');
                    contentDiv.classList.toggle('active');

                    if (toggle.classList.contains('active') && !markdownDiv.innerHTML.trim()) {
                        try {
                            const resp = await fetch(filePath);
                            if (!resp.ok) throw new Error(`Could not load ${filePath}`);
                            let md = await resp.text();

                            const baseDir = filePath.substring(0, filePath.lastIndexOf('/'));
                            md = md.replace(
                                /!\[([^\]]*)\]\((images\/[^)]+)\)/g,
                                (_, alt, img) => `![${alt}](${baseDir}/${img})`
                            );
                            md = md.replace(
                                /<img([^>]*)src="images\/([^"]+)"([^>]*)>/g,
                                (_, pre, img, post) => `<img${pre}src="${baseDir}/images/${img}"${post}>`
                            );

                            markdownDiv.innerHTML = Blog.renderMarkdown(md);
                        } catch (err) {
                            markdownDiv.innerHTML = `<p class="error">Error loading content: ${err.message}</p>`;
                        }
                    }
                });
            });
        });
    </script>
